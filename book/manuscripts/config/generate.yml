# generate-manuscripts.js の動作設定ファイル

# 著者紹介のプロフィールテンプレート
# 使用可能な変数: {author} (著者名), {title} (記事タイトル、複数の場合はコンマ区切り), {profile} (プロフィール文)
profile_template: |
  ### {author}（{title}）

  {profile}

# 奥付（colophon.md）の設定
# title と author は vivliostyle.config.js から自動取得されます。

# 版の履歴（自由文・複数行可）
# 例:
#   edition_history: |
#     2023年5月15日 初版
#     2023年5月20日 初版 2刷
#     2023年6月15日 第二版
edition_history: 初版

# 表紙デザイナー名（省略可）
cover_designer: ''

# 印刷会社名（省略可）
print_company: ''

# 連絡先（URL またはメールアドレスなど）
contact: https://x.com/yumemiinc

# コピーライト年（例: 2023）
copyright_year: ''
