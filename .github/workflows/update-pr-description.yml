# PR に含まれるすべての変更点を PR 概要欄にまとめて記載する。
# 直近のコミット内容だけでなく、PR のこれまでの変更点を「これまでの変更点」セクションに
# 自動生成することで、レビュアーが PR 全体の変更を把握しやすくする。

name: PR概要の自動更新

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  update-pr-description:
    runs-on: ubuntu-latest
    # フォークからのPRは GITHUB_TOKEN での PR 更新が不可のため除外する
    if: github.event.pull_request.head.repo.fork == false

    steps:
      # リポジトリをチェックアウト（PR の全コミット履歴が必要）
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # PR概要に、このPRのこれまでのすべての変更点をまとめて記載する
      - name: Update PR description with all changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 - << 'PYEOF'
          import subprocess
          import os
          import sys

          pr_number = os.environ['PR_NUMBER']
          base_sha = os.environ['BASE_SHA']
          head_sha = os.environ['HEAD_SHA']

          # このPRのすべてのコミット件名を取得（マージコミット除外・古い順）
          # --format=%s でコミットの件名（1行目）のみを取得し、概要欄を簡潔に保つ
          result = subprocess.run(
              ['git', 'log', '--no-merges', '--reverse', '--format=%s', f'{base_sha}..{head_sha}'],
              capture_output=True, text=True, check=True
          )
          commits = [line for line in result.stdout.strip().split('\n') if line]

          if not commits:
              print("No commits found, skipping PR description update.")
              sys.exit(0)

          # 現在のPR本文を取得
          result = subprocess.run(
              ['gh', 'pr', 'view', pr_number, '--json', 'body', '--jq', '.body // ""'],
              capture_output=True, text=True, check=True
          )
          current_body = result.stdout.strip()

          # 既存の「これまでの変更点」セクションを削除して再生成する
          marker = '## これまでの変更点'
          idx = current_body.find(marker)
          if idx != -1:
              base_body = current_body[:idx].rstrip()
          else:
              base_body = current_body

          # 変更点リストを生成
          changes_lines = '\n'.join(f'- {commit}' for commit in commits)

          # 新しいPR本文を組み立てる
          if base_body:
              new_body = f"{base_body}\n\n{marker}\n\n{changes_lines}"
          else:
              new_body = f"{marker}\n\n{changes_lines}"

          # PR本文を更新
          subprocess.run(
              ['gh', 'pr', 'edit', pr_number, '--body', new_body],
              check=True
          )
          print(f"PR #{pr_number} の概要を {len(commits)} 件のコミットで更新しました。")
          PYEOF
