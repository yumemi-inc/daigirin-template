# タグ「n版」または「n版m刷」（たとえば「初版」、「初版2刷」や「第二版一刷」など）をプッシュすると、
# 電子版および印刷入稿用 PDF を添付したリリースが作成されます。
#
# [未対応内容]
# - 電子版 PDF は本文のみで、表紙画像の結合は未対応です。
# - 表紙データ PSD など、その他のファイルはリリースを編集して、追加してください。

name: Publish and Release PDF

on:
  push:
    tags:
      - '*版'
      - '*版*刷'

permissions:
  contents: write

jobs:
  publish-and-release-pdf:
    name: Publish and Release PDF
    runs-on: ubuntu-latest

    # 環境変数を定義する
    env:
      # 生成される PDF のパス
      EBOOK_PDF_PATH: ./book/output/ebook.pdf
      EBOOK_COVERED_PDF_PATH: ./book/output/ebook_covered.pdf
      PRESS_PDF_PATH: ./book/output/press.pdf
      COVER_PNG_PATH: ./book/cover/cover.png
      COVER_PSD_PATH: ./book/cover/*.psd
    
    steps:

      # リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Node.jsをセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.node-version'
      
      # PDFを作成する
      - name: make PDF
        run: |
          corepack enable
          yarn install --immutable
          
          yarn build
          if [ ! -f "${EBOOK_PDF_PATH}" ]; then
            echo "エラー: 電子版 PDF の生成に失敗しました。"
            exit 1
          fi

          yarn cover
          if [ ! -f "${EBOOK_COVERED_PDF_PATH}" ]; then
            echo "ワーニング: 電子版 PDF の表紙付けがされていません。"
          fi
      
      # vivliostyle-cli コンテナ（UID 1000）が book/ に書き込めるようにする
      - name: Fix workspace ownership for vivliostyle container
        run: sudo chown -R 1000:1000 ${{ github.workspace }}/book

      # 印刷入稿用 PDF を作成（Docker コンテナ内 UID 1000 で実行）
      - name: Build press PDF
        run: |
          make pdf_press
          if [ ! -f "${PRESS_PDF_PATH}" ]; then
            echo "エラー: 印刷入稿用 PDF の生成に失敗しました。"
            exit 1
          fi
      
      # リリース作成のために所有権を runner に戻す
      - name: Restore workspace ownership
        if: always()
        run: sudo chown -R $(id -u):$(id -g) ${{ github.workspace }}/book
      
      # リリースの作成
      - name: Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            ${{ env.EBOOK_PDF_PATH }}
            ${{ env.EBOOK_COVERED_PDF_PATH }}
            ${{ env.PRESS_PDF_PATH }}
            ${{ env.COVER_PNG_PATH }}
            ${{ env.COVER_PSD_PATH }}
